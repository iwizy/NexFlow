name: Schema Validation

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  schema-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install validation tooling
        run: npm ci --ignore-scripts

      - name: Run repository smoke checks
        run: ./scripts/schema-smoke

      - name: Validate example manifests against schemas
        run: npm run validate

      - name: Run ActorSet schema boundary checks
        run: npm run actor-schema-smoke

      - name: Run agent identity schema boundary checks
        run: npm run agent-identity-schema-smoke

      - name: Run human override schema boundary checks
        run: npm run human-override-schema-smoke

      - name: Run semantic reference smoke checks
        run: npm run semantic-smoke
