specVersion: "0.1"
kind: ContextSet
metadata:
  project: enterprise-team
contextSources:
  - id: repository
    type: github
    description: Enterprise source repository.
    uri: https://github.com/example/enterprise-system
    contentTypes:
      - source_code
      - pull_requests
    access:
      default: read
      allowedActors:
        - enterprise-architect
        - implementation-agent
        - security-reviewer
        - release-manager
    classification: confidential
    refreshPolicy: on_request
  - id: issue_tracker
    type: jira
    description: Enterprise issue tracker.
    contentTypes:
      - tickets
      - metadata
    access:
      default: query
      allowedActors:
        - enterprise-architect
        - implementation-agent
        - compliance-reviewer
        - release-manager
    classification: confidential
    refreshPolicy: on_workflow_start
  - id: architecture_docs
    type: confluence
    description: Architecture decision records and standards.
    contentTypes:
      - documentation
      - knowledge_articles
    access:
      default: read
      allowedActors:
        - enterprise-architect
        - implementation-agent
        - security-reviewer
        - compliance-reviewer
        - release-manager
    classification: confidential
    refreshPolicy: on_request
  - id: security_knowledge
    type: knowledge_base
    description: Security standards and sanitized threat models.
    contentTypes:
      - knowledge_articles
      - metadata
    access:
      default: read
      allowedActors:
        - security-reviewer
        - compliance-reviewer
        - enterprise-architect
    classification: restricted
    refreshPolicy: manual
    freshness:
      maxAge: 30d
      staleAllowed: false
      requiresCitation: true
    approvalGates:
      - security_review
  - id: mcp_tools
    type: mcp
    description: Approved enterprise development MCP server.
    contentTypes:
      - tool_results
      - metadata
    access:
      default: query
      allowedActors:
        - implementation-agent
    classification: confidential
    refreshPolicy: manual
    mcp:
      serverId: enterprise_development_tools
      exposes:
        - context
        - tools
      allowedTools:
        - build-log-reader
        - dependency-inventory-reader
      requiresApprovalForTools: true
    approvalGates:
      - security_review
