specVersion: "0.1"
kind: MemorySet
metadata:
  project: enterprise-team
memoryScopes:
  - scope: ephemeral
    retention: Session only.
    ownership: Runtime or current actor.
    visibility: Current actor.
    updateRules: Automatic during active work.
    sensitivity: confidential
    allowedConsumers:
      - enterprise-architect
      - implementation-agent
      - security-reviewer
      - compliance-reviewer
      - release-manager
    updateMode: automatic
    allowedWriters:
      - enterprise-architect
      - implementation-agent
      - security-reviewer
      - compliance-reviewer
      - release-manager
    prohibitedContent:
      - raw_secrets
      - credential_values
  - scope: task
    retention: Until task closure plus audit retention policy.
    ownership: Enterprise project.
    visibility: Task participants and required reviewers.
    updateRules: Updates must cite task, artifact, or approval.
    sensitivity: confidential
    allowedConsumers:
      - enterprise-architect
      - implementation-agent
      - security-reviewer
      - compliance-reviewer
      - release-manager
    updateMode: review_required
    allowedWriters:
      - enterprise-architect
      - implementation-agent
      - security-reviewer
      - compliance-reviewer
      - release-manager
    allowedSourceScopes:
      - ephemeral
    prohibitedContent:
      - raw_secrets
      - credential_values
      - customer_identifiers
      - security_exploit_details
    auditEvents:
      - task.completed
      - task.blocked
  - scope: project
    retention: Enterprise retention policy.
    ownership: Project maintainers.
    visibility: Maintainers and approved reviewers.
    updateRules: Review required for durable updates.
    sensitivity: confidential
    allowedConsumers:
      - enterprise-architect
      - security-reviewer
      - release-manager
    updateMode: approval_required
    allowedWriters:
      - enterprise-architect
      - security-reviewer
    allowedSourceScopes:
      - task
    prohibitedContent:
      - raw_secrets
      - credential_values
      - customer_identifiers
      - production_incident_details
    auditEvents:
      - review.requested
      - review.completed
    approvalGate: architecture_review
  - scope: organization
    retention: Organization retention policy.
    ownership: Organization.
    visibility: Authorized human reviewers only.
    updateRules: Compliance approval required.
    sensitivity: restricted
    allowedConsumers:
      - enterprise-architect
      - security-reviewer
      - compliance-reviewer
    updateMode: approval_required
    allowedWriters:
      - security-reviewer
      - compliance-reviewer
    allowedSourceScopes:
      - project
    prohibitedContent:
      - raw_secrets
      - credential_values
      - provider_private_outputs
    auditEvents:
      - review.requested
      - review.completed
    approvalGate: security_review
