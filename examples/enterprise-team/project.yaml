specVersion: "0.1"
kind: Project
metadata:
  project: enterprise-team
  name: Enterprise Team
project:
  id: enterprise-team
  displayName: Enterprise Team
  description: Governed enterprise delivery configuration with audit-ready evidence and release controls.
  license: MIT
  maintainers:
    - id: enterprise-architect
      name: Enterprise Architect
      role: architect
    - id: security-reviewer
      name: Security Reviewer
      role: security
    - id: compliance-reviewer
      name: Compliance Reviewer
      role: compliance
    - id: release-manager
      name: Release Manager
      role: release
  defaultAutonomy: ask_before_changes
  policies:
    requireReview: true
    secretHandling: Secrets must remain in approved secret managers.
    networkAccess: Denied unless listed in context policy.
    destructiveActions: Human approval and audit event required.
    productionActions: Release and security approval required.
    evidenceHandling: Sensitive evidence must be referenced by artifact ID or approved system reference.
    auditTrail: Approval, handoff, review, memory, and release events must be retained under enterprise audit policy.
    memoryPromotion: Durable project, team, or organization memory requires declared review or approval.
  approvalGates:
    - id: architecture_review
      description: Enterprise architect approval required for design direction.
      requiredApprovers:
        - enterprise-architect
      appliesTo:
        - architecture-assessment
        - implement-enterprise-change
    - id: security_review
      description: Security reviewer approval required for sensitive changes.
      requiredApprovers:
        - security-reviewer
      appliesTo:
        - security-review
        - security_knowledge
        - mcp_tools
    - id: compliance_review
      description: Compliance reviewer approval required for evidence packets, audit summaries, and restricted durable memory.
      requiredApprovers:
        - compliance-reviewer
      appliesTo:
        - compliance-signoff
        - compliance_evidence
        - audit_register
    - id: release_approval
      description: Release manager approval required for deployment.
      requiredApprovers:
        - release-manager
      appliesTo:
        - release-approval
manifests:
  agents: agents.yaml
  agentDefinitions: agent-definitions.yaml
  workflow: workflow.yaml
  tasks: tasks.yaml
  handoffs: handoffs.yaml
  permissions: permissions.yaml
  capabilities: capabilities.yaml
  context: context.yaml
  memory: memory.yaml
  providers: providers.yaml
  modelProfiles: model-profiles.yaml
  promptSets: prompt-sets.yaml
  retrievalProfiles: retrieval-profiles.yaml
  events: events.yaml
  extensions: extensions.yaml
