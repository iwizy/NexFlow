specVersion: "0.1"
kind: Workflow
metadata:
  project: enterprise-team
workflow:
  id: enterprise-change-control
  displayName: Enterprise Change Control
  description: Governed flow for sensitive enterprise changes with evidence, audit, and release controls.
  triggers:
    - task.created
  stages:
    - id: assessment
      displayName: Assessment
      steps:
        - id: step-architecture-assessment
          task: architecture-assessment
          dependsOn: []
          approvalGates:
            - architecture_review
          emits:
            - task.completed
            - handoff.created
            - review.completed
    - id: implementation
      displayName: Implementation
      steps:
        - id: step-implement-enterprise-change
          task: implement-enterprise-change
          dependsOn:
            - step-architecture-assessment
          approvalGates:
            - architecture_review
          emits:
            - task.completed
            - handoff.created
    - id: assurance
      displayName: Assurance
      steps:
        - id: step-security-review
          task: security-review
          dependsOn:
            - step-implement-enterprise-change
          approvalGates:
            - security_review
          emits:
            - task.completed
            - review.completed
        - id: step-compliance-signoff
          task: compliance-signoff
          dependsOn:
            - step-security-review
          approvalGates:
            - compliance_review
          emits:
            - task.completed
            - review.completed
            - handoff.created
    - id: release
      displayName: Release
      steps:
        - id: step-release-approval
          task: release-approval
          dependsOn:
            - step-compliance-signoff
          approvalGates:
            - release_approval
          emits:
            - review.completed
            - workflow.completed
  dependencies:
    - from: step-architecture-assessment
      to: step-implement-enterprise-change
      type: blocks
    - from: step-implement-enterprise-change
      to: step-security-review
      type: blocks
    - from: step-security-review
      to: step-compliance-signoff
      type: blocks
    - from: step-compliance-signoff
      to: step-release-approval
      type: blocks
  auditTrail:
    requiredArtifacts:
      - architecture_note
      - command_log
      - security_report
      - compliance_evidence_packet
      - audit_trail_summary
      - release_approval_record
    requiredEvents:
      - workflow.started
      - task.completed
      - handoff.created
      - review.requested
      - review.completed
      - workflow.completed
