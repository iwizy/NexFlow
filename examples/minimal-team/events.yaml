specVersion: "0.1"
kind: EventSet
metadata:
  project: minimal-team
envelope:
  required:
    - specVersion
    - eventId
    - type
    - occurredAt
    - actor
    - subject
    - correlationId
    - payload
  auditRecommended:
    - recordedAt
    - source
    - causationId
    - audit
  redactionPolicy: Follow project security policy; prefer references over raw sensitive content.
events:
  - type: task.created
    description: A task is created.
    retention: Project policy.
    auditRequired: true
    payload:
      required:
        - taskId
        - actor
  - type: task.completed
    description: A task is completed.
    retention: Project policy.
    auditRequired: true
    payload:
      required:
        - taskId
        - artifacts
  - type: review.requested
    description: A review is requested.
    retention: Project policy.
    auditRequired: true
    payload:
      required:
        - reviewer
        - artifacts
  - type: review.completed
    description: A review is completed.
    retention: Project policy.
    auditRequired: true
    payload:
      required:
        - result
  - type: handoff.created
    description: Responsibility is transferred for review.
    retention: Project policy.
    auditRequired: true
    payload:
      required:
        - from
        - to
  - type: agent.started
    description: An agent session starts with a declared definition and model profile.
    retention: Project policy.
    auditRequired: true
    payload:
      required:
        - agentId
        - agentDefinitionRef
        - modelProfileRef
  - type: network.decision
    description: A structured network policy decision is recorded without request secrets or payloads.
    retention: Project policy.
    auditRequired: true
    payload:
      required:
        - actor
        - purpose
        - decision
        - ruleIds
        - redactionApplied
