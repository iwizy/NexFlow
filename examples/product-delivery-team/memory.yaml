specVersion: "0.1"
kind: MemorySet
metadata:
  project: product-delivery-team
memoryScopes:
  - scope: ephemeral
    retention: Session only.
    ownership: Runtime or current actor.
    visibility: Current actor.
    updateRules: Automatic during active work.
    sensitivity: internal
    allowedConsumers:
      - product-manager
      - ux-agent
      - implementation-agent
      - qa-agent
      - launch-coordinator
    updateMode: automatic
    allowedWriters:
      - product-manager
      - ux-agent
      - implementation-agent
      - qa-agent
      - launch-coordinator
    prohibitedContent:
      - raw_secrets
      - credential_values
      - customer_identifiers
  - scope: task
    retention: Until delivery task is closed.
    ownership: Project.
    visibility: Task participants.
    updateRules: Updates must link to task or artifact.
    sensitivity: internal
    allowedConsumers:
      - product-manager
      - ux-agent
      - implementation-agent
      - qa-agent
      - launch-coordinator
    updateMode: review_required
    allowedWriters:
      - product-manager
      - ux-agent
      - implementation-agent
      - qa-agent
      - launch-coordinator
    allowedSourceScopes:
      - ephemeral
    prohibitedContent:
      - raw_secrets
      - credential_values
      - customer_identifiers
      - unreviewed_launch_claims
    auditEvents:
      - task.completed
      - handoff.created
  - scope: project
    retention: Product policy.
    ownership: Product manager.
    visibility: Product and launch authorities.
    updateRules: Durable updates require product acceptance.
    sensitivity: confidential
    allowedConsumers:
      - product-manager
      - launch-coordinator
    updateMode: approval_required
    allowedWriters:
      - product-manager
      - launch-coordinator
    allowedSourceScopes:
      - task
    prohibitedContent:
      - raw_secrets
      - credential_values
      - customer_identifiers
      - unreviewed_launch_claims
      - unresolved_quality_blockers
    auditEvents:
      - review.completed
      - workflow.completed
    approvalGate: product_acceptance
