specVersion: "0.1"
kind: PermissionSet
metadata:
  project: product-delivery-team
permissions:
  - id: product_acceptance_authority
    description: Product manager can approve scope and acceptance.
    subjects:
      - product-manager
    capabilities:
      - manage_tasks
      - read_context
      - approve_changes
    effect: allow
    conditions:
      - Product acceptance must distinguish accepted behavior from non-goals and follow-ups.
  - id: ux_context_access
    description: UX agent can inspect design and customer documentation.
    subjects:
      - ux-agent
    capabilities:
      - access_figma
      - read_context
      - read_documentation
    effect: allow
    conditions:
      - Figma and customer documentation access remains read-only.
      - Customer documentation must be sanitized before use.
  - id: delivery_implementation_work
    description: Implementation agent can draft delivery changes after product acceptance.
    subjects:
      - implementation-agent
    capabilities:
      - read_repository
      - write_repository
      - create_branch
      - execute_command
      - read_context
    effect: approval_required
    approvalGate: product_acceptance
    conditions:
      - Product acceptance or accepted delivery goal is recorded before repository writes.
      - Implementation notes must trace work to UX criteria and acceptance matrix.
      - No launch or deployment action is allowed.
  - id: qa_quality_gate
    description: QA agent can run approved checks and approve quality evidence.
    subjects:
      - qa-agent
    capabilities:
      - read_repository
      - execute_command
      - read_context
      - approve_changes
    effect: approval_required
    approvalGate: quality_gate
    conditions:
      - Validation matrix must record passed, failed, skipped, and not-run checks.
      - Launch risk summary must identify blockers and accepted risks.
  - id: launch_authority
    description: Launch coordinator can approve release actions and documentation.
    subjects:
      - launch-coordinator
    capabilities:
      - read_context
      - create_pull_request
      - modify_documentation
      - deploy_application
      - approve_changes
    effect: approval_required
    approvalGate: launch_gate
    conditions:
      - Product acceptance record is present.
      - Quality gate evidence is present.
      - Release notes, launch decision, and rollback notes are ready.
