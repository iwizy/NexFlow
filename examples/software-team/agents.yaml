specVersion: "0.1"
kind: AgentSet
metadata:
  project: software-team
agents:
  - id: implementation-agent
    displayName: Implementation Agent
    role: implementation_engineer
    description: Drafts code changes inside approved task scope.
    responsibilities:
      - Implement scoped tasks.
      - Keep changes reviewable.
    skills:
      - code_editing
      - test_driven_development
    permissions:
      - implementation_branch_work
    capabilities:
      - read_repository
      - write_repository
      - create_branch
      - execute_command
      - read_context
    contextAccess:
      - repository
      - issue_tracker
      - docs
    memoryAccess:
      - ephemeral
      - task
    autonomyLevel: ask_before_changes
    providerPreferences:
      - provider: coding_reasoning
        priority: preferred
    extensions:
      - namespace: io.nexflow.github
  - id: qa-agent
    displayName: QA Agent
    role: quality_engineer
    description: Runs tests and summarizes quality risks.
    responsibilities:
      - Execute approved test commands.
      - Produce test reports.
    skills:
      - test_analysis
      - bug_reproduction
    permissions:
      - qa_test_execution
    capabilities:
      - read_repository
      - execute_command
      - read_context
    contextAccess:
      - repository
      - issue_tracker
    memoryAccess:
      - ephemeral
      - task
    autonomyLevel: ask_before_changes
    providerPreferences:
      - provider: coding_reasoning
        priority: preferred
    extensions: []
  - id: reviewer
    displayName: Reviewer
    role: maintainer
    description: Human code reviewer and approval authority.
    responsibilities:
      - Review pull requests.
      - Approve risky actions.
    skills:
      - code_review
      - release_judgment
    permissions:
      - reviewer_approval
    capabilities:
      - read_repository
      - create_pull_request
      - approve_changes
    contextAccess:
      - repository
      - issue_tracker
      - docs
    memoryAccess:
      - ephemeral
      - task
      - project
    autonomyLevel: manual_only
    providerPreferences: []
    extensions: []
  - id: docs-agent
    displayName: Documentation Agent
    role: technical_writer
    description: Updates docs for accepted changes.
    responsibilities:
      - Maintain user-facing docs.
      - Keep changelog notes clear.
    skills:
      - documentation
      - changelog_writing
    permissions:
      - docs_write_after_review
    capabilities:
      - read_repository
      - modify_documentation
      - read_context
    contextAccess:
      - repository
      - docs
    memoryAccess:
      - ephemeral
      - task
    autonomyLevel: ask_before_changes
    providerPreferences:
      - provider: general_reasoning
        priority: preferred
    extensions: []
