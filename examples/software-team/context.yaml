specVersion: "0.1"
kind: ContextSet
metadata:
  project: software-team
contextSources:
  - id: repository
    type: github
    description: Source repository and pull request metadata.
    uri: https://github.com/example/software-team
    contentTypes:
      - source_code
      - pull_requests
    access:
      default: read
      allowedActors:
        - implementation-agent
        - qa-agent
        - reviewer
        - docs-agent
    classification: internal
    refreshPolicy: on_request
  - id: issue_tracker
    type: linear
    description: Product and engineering tasks.
    contentTypes:
      - tickets
      - metadata
    access:
      default: query
      allowedActors:
        - implementation-agent
        - qa-agent
        - reviewer
    classification: internal
    refreshPolicy: on_workflow_start
  - id: docs
    type: docs
    description: Project documentation.
    uri: docs/
    contentTypes:
      - documentation
    access:
      default: read
      allowedActors:
        - reviewer
        - docs-agent
        - implementation-agent
    classification: public
    refreshPolicy: on_request
  - id: mcp_tools
    type: mcp
    description: Approved local development tool server.
    contentTypes:
      - tool_results
      - metadata
    access:
      default: query
      allowedActors:
        - implementation-agent
        - qa-agent
    classification: internal
    refreshPolicy: manual
    mcp:
      serverId: local_development_tools
      exposes:
        - context
        - tools
      allowedTools:
        - test-log-reader
        - dependency-graph-reader
      requiresApprovalForTools: true
    approvalGates:
      - dependency_approval
