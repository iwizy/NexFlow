specVersion: "0.1"
kind: MemorySet
metadata:
  project: software-team
memoryScopes:
  - scope: ephemeral
    retention: Session only.
    ownership: Runtime or current actor.
    visibility: Current actor.
    updateRules: Automatic during active work.
    sensitivity: internal
    allowedConsumers:
      - implementation-agent
      - qa-agent
      - docs-agent
      - reviewer
    updateMode: automatic
    allowedWriters:
      - implementation-agent
      - qa-agent
      - docs-agent
      - reviewer
    prohibitedContent:
      - raw_secrets
      - credential_values
  - scope: task
    retention: Until task is closed.
    ownership: Project.
    visibility: Task participants and reviewer.
    updateRules: Updates must cite task or artifact.
    sensitivity: internal
    allowedConsumers:
      - implementation-agent
      - qa-agent
      - docs-agent
      - reviewer
    updateMode: actor_requested
    allowedWriters:
      - implementation-agent
      - qa-agent
      - docs-agent
      - reviewer
    allowedSourceScopes:
      - ephemeral
    prohibitedContent:
      - raw_secrets
      - credential_values
    auditEvents:
      - task.completed
      - task.blocked
  - scope: project
    retention: Maintainer policy.
    ownership: Maintainers.
    visibility: Maintainers and approved agents.
    updateRules: Review required for durable updates.
    sensitivity: internal
    allowedConsumers:
      - reviewer
    updateMode: approval_required
    allowedWriters:
      - reviewer
    allowedSourceScopes:
      - task
    prohibitedContent:
      - raw_secrets
      - credential_values
      - unreviewed_external_claims
    auditEvents:
      - review.completed
    approvalGate: code_review
