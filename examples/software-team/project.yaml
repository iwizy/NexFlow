specVersion: "0.1"
kind: Project
metadata:
  project: software-team
  name: Software Team
project:
  id: software-team
  displayName: Software Team
  description: Reference configuration for a small software delivery team.
  license: MIT
  maintainers:
    - id: reviewer
      name: Code Reviewer
      role: maintainer
  defaultAutonomy: ask_before_changes
  policies:
    requireReview: true
    secretHandling: Use secret references only.
    networkAccess:
      default: deny
      rules:
        - id: approved_project_services
          description: Approved agents may reach declared context, provider, and integration services.
          effect: approval_required
          actors:
            - implementation-agent
            - qa-agent
            - docs-agent
          capabilities:
            - access_network
          purposes:
            - context_read
            - provider_request
            - integration_read
          destinations:
            contextSources:
              - repository
              - issue_tracker
            providers:
              - coding_reasoning
              - general_reasoning
            extensions:
              - github_basic
              - linear_basic
            schemes:
              - https
            ports:
              - 443
          maxDataClassification: confidential
          approvalGate: network_access_review
      transport:
        requireTls: true
        allowPrivateNetworks: false
        allowLoopback: false
        followRedirects: false
        maxRedirects: 0
      audit:
        events:
          - network.decision
        recordDecisions: true
        recordDestination: true
        recordPurpose: true
        redactQuery: true
        redactHeaders: true
    destructiveActions: Human approval required.
    productionActions: Human approval required.
  approvalGates:
    - id: code_review
      description: Reviewer approval required before merge.
      requiredApprovers:
        - reviewer
    - id: dependency_approval
      description: Maintainer approval required before installing dependencies.
      requiredApprovers:
        - reviewer
    - id: network_access_review
      description: Reviewer approval required before an agent initiates an allowed outbound connection.
      requiredApprovers:
        - reviewer
manifests:
  agents: agents.yaml
  agentDefinitions: agent-definitions.yaml
  workflow: workflow.yaml
  tasks: tasks.yaml
  handoffs: handoffs.yaml
  permissions: permissions.yaml
  capabilities: capabilities.yaml
  context: context.yaml
  memory: memory.yaml
  providers: providers.yaml
  modelProfiles: model-profiles.yaml
  promptSets: prompt-sets.yaml
  retrievalProfiles: retrieval-profiles.yaml
  events: events.yaml
  extensions: extensions.yaml
