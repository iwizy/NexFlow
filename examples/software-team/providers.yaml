specVersion: "0.1"
kind: ProviderSet
metadata:
  project: software-team
providers:
  - id: coding_reasoning
    type: abstract
    description: Provider-neutral coding and review model class.
    capabilities:
      - text_generation
      - code_reasoning
      - tool_reasoning
    constraints:
      allowTrainingUse: false
    selection:
      strategy: project_policy
  - id: general_reasoning
    type: abstract
    description: Provider-neutral general reasoning model class.
    capabilities:
      - text_generation
    constraints:
      allowTrainingUse: false
    selection:
      strategy: project_policy
