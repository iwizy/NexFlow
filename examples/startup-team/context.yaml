specVersion: "0.1"
kind: ContextSet
metadata:
  project: startup-team
contextSources:
  - id: repository
    type: github
    description: Product code repository.
    uri: https://github.com/example/startup-app
    contentTypes:
      - source_code
      - pull_requests
    access:
      default: read
      allowedActors:
        - fullstack-agent
        - release-reviewer
    classification: internal
    refreshPolicy: on_request
  - id: product_backlog
    type: linear
    description: Startup product backlog.
    access:
      default: query
      allowedActors:
        - product-owner
        - fullstack-agent
        - release-reviewer
    classification: internal
    refreshPolicy: on_workflow_start
  - id: design_files
    type: figma
    description: Product design files and prototypes.
    contentTypes:
      - designs
      - metadata
    access:
      default: read
      allowedActors:
        - product-owner
        - design-agent
        - fullstack-agent
    classification: confidential
    refreshPolicy: on_request
  - id: customer_research
    type: knowledge_base
    description: Sanitized customer research notes.
    contentTypes:
      - knowledge_articles
    access:
      default: read
      allowedActors:
        - product-owner
        - design-agent
    classification: confidential
    refreshPolicy: manual
    freshness:
      maxAge: 30d
      staleAllowed: true
      requiresCitation: false
  - id: docs
    type: docs
    description: Product documentation.
    uri: docs/
    contentTypes:
      - documentation
    access:
      default: read
      allowedActors:
        - fullstack-agent
        - release-reviewer
    classification: public
    refreshPolicy: on_request
  - id: web_research
    type: web
    description: Market and standards research for approved tasks.
    contentTypes:
      - web_pages
    access:
      default: query
      allowedActors:
        - product-owner
        - design-agent
    classification: public
    refreshPolicy: on_request
    freshness:
      maxAge: 14d
      staleAllowed: false
      requiresCitation: true
    allowedDomains:
      - example.com
