specVersion: "0.1"
kind: EventSet
metadata:
  project: startup-team
events:
  - type: task.created
    description: A product task is created.
    retention: Project policy.
    auditRequired: true
    payload:
      required:
        - taskId
  - type: task.completed
    description: A task is completed.
    retention: Project policy.
    auditRequired: true
    payload:
      required:
        - taskId
        - artifacts
  - type: task.blocked
    description: A task is blocked by missing product, research, validation, or release evidence.
    retention: Project policy.
    auditRequired: true
    payload:
      required:
        - taskId
        - reason
  - type: handoff.created
    description: Responsibility is handed to another actor.
    retention: Project policy.
    auditRequired: true
    payload:
      required:
        - from
        - to
        - artifacts
  - type: handoff.accepted
    description: Receiving actors accept responsibility for the next startup delivery step.
    retention: Project policy.
    auditRequired: true
    payload:
      required:
        - handoffId
        - acceptedBy
  - type: review.requested
    description: Review is requested.
    retention: Project policy.
    auditRequired: true
    payload:
      required:
        - reviewer
  - type: review.completed
    description: Review is completed.
    retention: Project policy.
    auditRequired: true
    payload:
      required:
        - result
        - approvalGate
  - type: agent.started
    description: An agent session starts with a declared definition and model profile.
    retention: Project policy.
    auditRequired: true
    payload:
      required:
        - agentId
        - agentDefinitionRef
        - modelProfileRef
  - type: workflow.completed
    description: Startup delivery flow completes.
    retention: Project policy.
    auditRequired: true
    payload:
      required:
        - outcome
