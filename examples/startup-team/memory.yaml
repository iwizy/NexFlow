specVersion: "0.1"
kind: MemorySet
metadata:
  project: startup-team
memoryScopes:
  - scope: ephemeral
    retention: Session only.
    ownership: Runtime or current actor.
    visibility: Current actor.
    updateRules: Automatic during active work.
    sensitivity: internal
    allowedConsumers:
      - product-owner
      - design-agent
      - fullstack-agent
      - release-reviewer
    updateMode: automatic
    allowedWriters:
      - product-owner
      - design-agent
      - fullstack-agent
      - release-reviewer
    prohibitedContent:
      - raw_secrets
      - credential_values
  - scope: task
    retention: Until task acceptance.
    ownership: Project.
    visibility: Task participants.
    updateRules: Product owner may correct scope notes.
    sensitivity: internal
    allowedConsumers:
      - product-owner
      - design-agent
      - fullstack-agent
      - release-reviewer
    updateMode: actor_requested
    allowedWriters:
      - product-owner
      - design-agent
      - fullstack-agent
      - release-reviewer
    allowedSourceScopes:
      - ephemeral
    prohibitedContent:
      - raw_secrets
      - credential_values
      - customer_identifiers
    auditEvents:
      - task.completed
  - scope: project
    retention: Until project policy removes it.
    ownership: Product owner.
    visibility: Product owner and release reviewer.
    updateRules: Human approval required for durable product memory.
    sensitivity: confidential
    allowedConsumers:
      - product-owner
      - release-reviewer
    updateMode: approval_required
    allowedWriters:
      - product-owner
    allowedSourceScopes:
      - task
    prohibitedContent:
      - raw_secrets
      - credential_values
      - customer_identifiers
      - unreviewed_external_claims
    auditEvents:
      - review.completed
    approvalGate: product_review
